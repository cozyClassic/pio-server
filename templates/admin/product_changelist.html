{% extends "admin/change_list.html" %}

{% block extrahead %}
{{ block.super }}
<style>
  .revalidate-btn {
    background: #28a745 !important;
    color: white !important;
    padding: 10px 15px;
    text-decoration: none;
    border-radius: 4px;
    display: inline-block;
    font-weight: bold;
  }
  .revalidate-btn:hover {
    background: #218838 !important;
  }
  .price-save-btn {
    background: #007bff !important;
    color: white !important;
    padding: 10px 15px;
    text-decoration: none;
    border-radius: 4px;
    display: inline-block;
    font-weight: bold;
  }
  .price-save-btn:hover {
    background: #0056b3 !important;
  }
</style>
{% endblock %}

{% block object-tools-items %}
<li>
  <a href="save-current-prices/" class="price-save-btn" onclick="return confirm('모든 활성 상품의 현재 최저가를 기록하시겠습니까?');">
    💾 현재가격 저장
  </a>
</li>
<li>
  <a href="revalidate-all/" class="revalidate-btn" onclick="return confirm('모든 제품의 캐시를 갱신하시겠습니까?');">
    🔄 캐시 갱신 (Revalidate)
  </a>
</li>
<li>
  <a href="download-special-price/" class="price-save-btn" style="background: #ff6b35 !important;">
    특가폰 엑셀 다운로드
  </a>
</li>
<li>
  <a href="download-excel/" class="addlink"> Excel 다운로드 </a>
</li>
<li>
  <a href="upload-excel/" class="addlink"> Excel 업로드 </a>
</li>
{% endblock %}
